<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하이트진로 서초사옥 냉방기 가동 요청</title>
<style>
body{margin:0;padding:30px;background:#f5f5f5;font-family:'Malgun Gothic',sans-serif}
.container{max-width:1200px;margin:auto;background:#fff;padding:40px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{text-align:center;font-size:52px;color:#003366}
#clock{text-align:center;color:#666;font-size:22px;margin-bottom:25px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:25px 0}
.card{padding:24px;border-radius:12px;color:#fff;text-align:center}
.time{background:#607d8b}.temp{background:#e53935}.hum{background:#1e88e5}.pred{background:#fb8c00}
.card-title{font-size:20px}.card-value{font-size:42px;font-weight:bold;margin-top:8px}
.top-message{background:#fff8f8;border:2px solid #ffcccc;border-radius:10px;padding:20px;font-size:28px;font-weight:bold;color:#cc0000;white-space:pre-wrap}
.section{margin-top:30px;border-top:2px solid #ddd;padding-top:20px}
.section-title{font-size:24px;font-weight:bold;color:#003366}
.content{white-space:pre-wrap;font-size:28px}
#updated{text-align:right;color:#666;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>하이트진로 서초사옥 냉방기 가동 요청</h1>
<div id="clock"></div>
<div class="cards">
<div class="card time"><div class="card-title">현재시간</div><div class="card-value" id="cardTime">--:--</div></div>
<div class="card temp"><div class="card-title">현재온도</div><div class="card-value" id="cardTemp">--.-℃</div></div>
<div class="card hum"><div class="card-title">현재습도</div><div class="card-value" id="cardHum">--%</div></div>
<div class="card pred"><div class="card-title">10분 후</div><div class="card-value" id="cardPred">--.-℃</div></div>
</div>
<div id="topMessage" class="top-message">불러오는 중...</div>
<div class="section"><div class="section-title">일반 지시</div><div id="normalMessage" class="content"></div></div>
<div class="section"><div class="section-title">특별 지시</div><div id="specialMessage" class="content"></div></div>
<div class="section"><div class="section-title">냉온수기 지시</div><div id="chillerMessage" class="content"></div></div>
<div id="updated">연결 중...</div>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbx4ra1IHHymOJ_rFNoA1NMI_vG9zO1pp9a0B9TghxOlSuWKwqx3doAEsOPOs2HGw4zu/exec';
function updateClock(){
 document.getElementById('clock').innerText='현재 시각 : '+new Date().toLocaleString('ko-KR');
 document.getElementById('cardTime').innerText=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
function setText(id,v,e){document.getElementById(id).innerText=(v||'').trim()||e;}
async function loadData(){
 try{
  const r=await fetch(API_URL+'?t='+Date.now());
  const data=await r.json();
  if(data.office){
    cardTemp.innerText=data.office.temperature+'℃';
    cardHum.innerText=data.office.humidity+'%';
    cardPred.innerText=data.office.prediction10+'℃';
  }
  setText('topMessage',data.top,'공지사항 없음');
  setText('normalMessage',data.normal,'현재 일반 지시 없음');
  setText('specialMessage',data.special,'현재 특별 지시 없음');
  setText('chillerMessage',data.chiller,'현재 냉온수기 지시 없음');
  updated.innerText='마지막 확인 : '+new Date().toLocaleTimeString();
 }catch(e){
  updated.innerText='데이터 연결 오류';
  console.error(e);
 }
}
updateClock();loadData();
setInterval(updateClock,1000);
setInterval(loadData,10000);
</script>
</body>
</html>
