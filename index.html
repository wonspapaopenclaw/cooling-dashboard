<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하이트진로 서초사옥 냉방기 가동 요청</title>
<style>
body{margin:0;padding:30px;background:#f5f5f5;font-family:'Malgun Gothic',sans-serif}
.container{max-width:1200px;margin:auto;background:#fff;padding:40px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{text-align:center;font-size:52px;color:#003366;margin-bottom:15px}
#clock{text-align:center;color:#666;font-size:22px;margin-bottom:25px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
.card{background:#f8fbff;border:2px solid #d8e9ff;border-radius:12px;padding:20px;text-align:center}
.card-title{font-size:20px;color:#666;margin-bottom:10px}
.card-value{font-size:42px;font-weight:bold;color:#003366}
.top-message{background:#fff8f8;border:2px solid #ffcccc;border-radius:10px;padding:20px;font-size:28px;font-weight:bold;color:#cc0000;text-align:center;white-space:pre-wrap}
.section{margin-top:30px;border-top:2px solid #e0e0e0;padding-top:20px}
.section-title{font-size:24px;font-weight:bold;color:#003366;margin-bottom:10px}
.content{white-space:pre-wrap;font-size:28px;line-height:1.7}
.empty{color:#999}
#updated{margin-top:30px;text-align:right;color:#666}
@media(max-width:768px){
h1{font-size:34px}.top-message{font-size:22px}.content{font-size:20px}.section-title{font-size:20px}
.cards{grid-template-columns:repeat(2,1fr)}
.card-value{font-size:28px}
}
</style>
</head>
<body>
<div class="container">
<h1>하이트진로 서초사옥 냉방기 가동 요청</h1>
<div id="clock"></div>

<div class="cards">
<div class="card"><div class="card-title">현재시간</div><div class="card-value" id="cardTime">--:--</div></div>
<div class="card"><div class="card-title">현재온도</div><div class="card-value" id="cardTemp">--.-℃</div></div>
<div class="card"><div class="card-title">현재습도</div><div class="card-value" id="cardHum">--%</div></div>
<div class="card"><div class="card-title">10분 후 예상</div><div class="card-value" id="cardPred">--.-℃</div></div>
</div>

<div id="topMessage" class="top-message">불러오는 중...</div>

<div class="section">
<div class="section-title">일반 지시</div>
<div id="normalMessage" class="content"></div>
</div>

<div class="section">
<div class="section-title">특별 지시</div>
<div id="specialMessage" class="content"></div>
</div>
